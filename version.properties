# AntiFraud version components.
# Final APK name: AntiFraud-MAJOR.MINOR.PATCH-ENV.apk
#   MAJOR  natural number; bump on breaking changes / large milestone (manual)
#   MINOR  per-feature; bump on feature-level work (manual, rendered with 3 digits)
#   PATCH  per-commit; computed from `git rev-list --count HEAD` (rendered with 3 digits)
#   ENV    dev | qa | prod product flavor; build flow per-flavor will be configured later
MAJOR=0
MINOR=1
