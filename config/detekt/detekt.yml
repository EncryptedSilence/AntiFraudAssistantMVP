naming:
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
    ignoreAnnotated:
      - 'Composable'

style:
  MagicNumber:
    active: true
    excludes: ['**/core/scoring/**', '**/core/correlation/**', '**/test/**', '**/androidTest/**', '**/testFixtures/**']
    ignoreNumbers: ['-1', '0', '1', '2', '3', '4', '100']
    ignoreEnums: true
    ignoreRanges: true

complexity:
  LongParameterList:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
    functionThreshold: 6
    constructorThreshold: 7
    ignoreDefaultParameters: false
    ignoreDataClasses: true
    ignoreAnnotatedParameter: []
  CyclomaticComplexMethod:
    active: true
    threshold: 18
    ignoreSingleWhenExpression: false
    ignoreSimpleWhenEntries: false
    ignoreNestingFunctions: false
    nestingFunctions:
      - 'also'
      - 'apply'
      - 'forEach'
      - 'isNotNull'
      - 'ifNull'
      - 'let'
      - 'run'
      - 'use'
      - 'with'
